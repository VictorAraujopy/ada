<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADA</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar">
    <div class="side-topo">
      <div class="side-label">arquivo</div>
      <button id="nova">+ nova conversa</button>
    </div>
    <div id="lista"></div>
    <div class="creed-side">we are the walking dead</div>
  </aside>

  <div class="coluna">
    <header>
      <div class="brand">
        <button id="menu" title="conversas">☰</button>
        <div class="logo"><span>A</span></div>
        <div>
          <div class="name">ADA</div>
          <div class="sub">local · offline · nada sai daqui</div>
        </div>
      </div>
      <div class="actions">
        <div class="badge off" id="badge">
          <svg class="ekg" viewBox="0 0 64 20" aria-hidden="true">
            <polyline points="0,10 13,10 18,3 23,17 28,10 38,10 43,6 47,14 51,10 64,10"/>
          </svg>
          <span id="estado">carregando</span>
        </div>
        <button id="exportar" title="baixar a conversa em markdown" disabled>exportar</button>
      </div>
    </header>

    <main id="chat"></main>

    <footer>
      <form id="form" class="off">
        <input id="msg" placeholder="carregando o cérebro…" autocomplete="off" disabled>
        <button type="submit" id="send" title="enviar">↑</button>
      </form>
      <div class="rodape-nota">9B rodando neste Mac — cada palavra nasce aqui.</div>
    </footer>
  </div>
</div>

<template id="tpl-empty">
  <div class="empty" id="empty">
    <div class="empty-ada">ADA</div>
    <div class="empty-risco"></div>
    <p class="empty-sub">o cérebro é meu. os pesos também.</p>
    <div class="chips">
      <button>quem é você?</button>
      <button>qual sua HQ favorita?</button>
      <button>me dá uma lição do Rick pra minha vida</button>
      <button>que horas são e como tá o Mac?</button>
    </div>
    <div class="creed">we are the walking dead</div>
  </div>
</template>

<script src="/static/app.js"></script>
</body>
</html>
